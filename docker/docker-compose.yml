services:
  falkordb:
    image: falkordb/falkordb:latest
    ports:
      - "6379:6379"
    environment:
      - FALKORDB_ARGS=--maxmemory 4gb --maxmemory-policy noeviction
    volumes:
      - falkordb_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  falkordb_data:
